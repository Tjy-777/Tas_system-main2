<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お会計</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-checkout.css">
</head>
<body class="checkout-body">

    <div class="checkout-top-display">
        <div class="display-left">
            <div id="clerk-label-checkout">担当: 1001</div>
            <div class="display-message">ｵｼﾊﾗｲ ｦ ｾﾝﾀｸ ｼﾃｸﾀﾞｻｲ</div>
        </div>
        <div class="display-right">
            合計 <span id="header-total">¥0</span>
        </div>
    </div>

    <div class="checkout-header">
        <button class="back-btn" onclick="location.href='Tas.html'">
            ← レジ画面に戻る
        </button>
    </div>

    <div class="checkout-container">
        
        <div class="checkout-receipt-pane">
            <div class="receipt-list" id="checkout-receipt-list">
                </div>
            
            <div class="checkout-total">
                <div class="total-label">合計(税込)</div>
                <div class="total-amount" id="checkout-total-amount">¥0</div>
            </div>
        </div>

        <div class="payment-methods-pane">
            <h3 class="section-title">お支払い方法</h3>
            
            <div class="payment-grid">
                <button class="pay-btn cash" id="btn-pay-cash">
                    <span>現金支払い</span>
                    <span style="font-size: 0.9rem; font-weight: normal; color: #065f46;">Cash</span>
                </button>
                <button class="pay-btn" id="btn-pay-credit">
                    <span>クレジット</span>
                    <span style="font-size: 0.9rem; font-weight: normal; color: #64748b;">Credit Card</span>
                </button>
                <button class="pay-btn" id="btn-pay-barcode">
                    <span>バーコード決済</span>
                    <span style="font-size: 0.9rem; font-weight: normal; color: #64748b;">Barcode Payment</span>
                <button class="pay-btn" id="btn-pay-e-money">
                    <span>電子マネー</span>
                    <span style="font-size: 0.9rem; font-weight: normal; color: #64748b;">Barcode Payment</span>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/checkout.js"></script>
</body>
</html>
